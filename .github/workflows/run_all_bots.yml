name: Run All Signal Bots

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: all-signal-bots
  cancel-in-progress: false

jobs:
  run-bots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PAXG bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PAPER_TRADE: "true"
        run: |
          python signal_bot.py

      - name: Run BTC bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PAPER_TRADE: "true"
        run: |
          python btc_signal_bot.py

      - name: Commit updated logs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add signals_log.csv btc_signals_log.csv paper_trades.csv btc_paper_trades.csv || true

          if git diff --cached --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "Update all bot logs"
            git pull --rebase
            git push
          fi
